# Fly.io — serviço WhatsApp (whatsapp-web.js + Chromium). Só rede privada.
# Secret: fly secrets set API_KEY=<mesma-chave-do-WHATSAPP_API_KEY-do-web>
app = "spreading-wa"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[[restart]]
  policy = "always"

[env]
  PORT = "3000"
  MAX_WHATSAPP_SESSIONS = "4"
  SESSION_START_STAGGER_MS = "12000"
  SESSION_INIT_TIMEOUT_MS = "90000"
  # Teto por tentativa abaixo do watchdog (45s) para o boot frio de Chromium nao
  # levar um SIGKILL no meio do "novo QR". Menos por tentativa, uma tentativa a mais.
  QR_BOOTSTRAP_TIMEOUT_MS = "40000"
  QR_BOOTSTRAP_MAX_ATTEMPTS = "3"
  QR_BOOTSTRAP_RETRY_MS = "2000"
  GROUP_SYNC_TIMEOUT_MS = "45000"
  QR_IDLE_DESTROY_MS = "180000"
  SEND_TIMEOUT_MS = "60000"
  SEND_REQUEST_TIMEOUT_MS = "55000"

# Sessão do WhatsApp (LocalAuth) persiste no volume — sobrevive a restart/deploy.
# IMPORTANTE: volume Fly prende a UMA máquina. Rode `fly scale count 1` para garantir
# uma única máquina — senão as sessões se dividem entre volumes diferentes.
[[mounts]]
  source = "wa_data"
  destination = "/app/.wwebjs_auth"

# Sem [http_service] público: o Django alcança via spreading-wa.internal:3000
# (rede privada Fly). O painel expõe QR/status pelo próprio Django.
[[services]]
  internal_port = 3000
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = "15s"
    timeout = "10s"
    grace_period = "60s"
    method = "GET"
    path = "/health"

# Cada WhatsApp conectado = 1 Chromium (~350MB). Dimensione a memória pela
# quantidade de instâncias simultâneas: 2gb ~ 3-4 sessões. Suba se OOM.
[[vm]]
  size = "shared-cpu-2x"
  memory = "4gb"
