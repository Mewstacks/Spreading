name: CI

on:
  push:
  pull_request:

jobs:
  django:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python/requirements.txt
      - run: pip install -r requirements.txt
      - run: python django/manage.py check
      - run: python django/manage.py makemigrations --check --dry-run
      - run: python django/manage.py test apps.scrapers apps.accounts

  whatsapp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node.js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: node.js/package-lock.json
      - run: npm ci
      - run: npm test
