# Fly.io — app Django (web + workers). Região São Paulo (gru).
# Secrets (NÃO versionar): fly secrets set DJANGO_SECRET_KEY=... DATABASE_URL=... \
#   WHATSAPP_API_KEY=... SECRETS_FERNET_KEY=... AMAZON_* EMAIL_* TELEGRAM_API_ID=...
# (login web do ML NÃO precisa de secret: roda no Chromium local — ver ml_conexao.py)
app = "spreading-web"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[[restart]]
  policy = "always"

[env]
  DJANGO_DEBUG = "0"
  DJANGO_ALLOWED_HOSTS = "spreading-web.fly.dev"
  DJANGO_CSRF_TRUSTED_ORIGINS = "https://spreading-web.fly.dev"
  # Piloto Awin ativo; cada afiliado conecta o próprio token pela tela Conta.
  AWIN_INTEGRATION_ENABLED = "1"
  ML_AUTH_DIR = "/data/ml_sessions"
  # Serviço do WhatsApp na rede privada do Fly (.internal).
  WHATSAPP_API_URL = "http://spreading-wa.internal:3000"

# migra o banco a cada deploy, antes de trocar as máquinas.
# (createcachetable saiu: o cache é LocMem por processo -- ver settings.py --, então
# a tabela nunca foi lida por ninguém.)
[deploy]
  release_command = "sh -c 'python django/manage.py migrate --noinput && python django/manage.py bootstrap_superuser'"

# Volume persistente das sessões do ML (auth_{id}.json). Preso a UMA máquina:
# por isso web + workers rodam juntos (honcho) e não escalamos horizontalmente.
[[mounts]]
  source = "ml_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/healthz"
    headers = { Host = "spreading-web.fly.dev", X-Forwarded-Proto = "https" }

# CPU dedicada, não compartilhada: esta máquina roda gunicorn + 5 workers de automação
# + Chromium (raspagem, Link Builder e o live view do login ML) ao mesmo tempo. Em
# shared-cpu-* a Fly cobra por cota de baseline e aplica throttle agressivo quando ela
# acaba — o Chromium sozinho queima a cota inteira e o painel inteiro fica lento junto,
# inclusive o healthcheck. Playwright na mesma VM do servidor web exige dedicada.
[[vm]]
  size = "performance-2x"
  memory = "4gb"
