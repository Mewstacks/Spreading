{% extends "base.html" %}
{% block title %}Link enviado — Spreading{% endblock %}
{% block content %}
<div style="max-width:26rem;margin:2rem auto;text-align:center;">
  <h1 style="font-size:1.5rem;font-weight:700;">Confira seu e-mail</h1>
  <div class="card" style="margin-top:1rem;">
    <p class="muted" style="font-size:.9rem;margin:0;">
      Se houver conta com esse e-mail, mandamos um link para redefinir a senha.
      Veja também a caixa de spam.
    </p>
  </div>
  <div style="margin-top:1.2rem;font-size:.85rem;"><a class="link" href="{% url 'login' %}">Voltar ao login</a></div>
</div>
{% endblock %}
